<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Formula 1 takımları — 2026 sezonu tüm constructor'lar."
    />
    <title>Teams | Formula 1</title>

    <!-- Google Fonts: Montserrat (italic + bold varyantları dahil) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,700;1,800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="page-teams" data-page="teams">

    <!-- ===== HEADER ===== -->
    <header class="site-header" role="banner">
      <div class="header-inner">

        <!-- Sol: Logo -->
        <a href="index.html" class="header-logo" aria-label="Formula 1 Ana Sayfa">
          <img
            src="formula-1-logo.png"
            alt="Formula 1 Logosu"
            class="logo-img logo-img--header"
          />
        </a>

        <!-- Sağ: Navigasyon -->
        <nav class="main-nav" aria-label="Ana navigasyon">
          <ul class="nav-list" role="list">
            <li class="nav-item">
              <a href="schedule.html" class="nav-link" id="nav-schedule">Schedule</a>
            </li>
            <li class="nav-item">
              <a href="result.html" class="nav-link" id="nav-result">Result</a>
            </li>
            <li class="nav-item">
              <a href="drivers.html" class="nav-link" id="nav-drivers">Drivers</a>
            </li>
            <li class="nav-item">
              <a href="teams.html" class="nav-link nav-link--active" id="nav-teams">Teams</a>
            </li>
          </ul>
        </nav>

      </div>
    </header>

    <!-- ===== MAIN ===== -->
    <main class="site-main site-main--teams" id="main-content" role="main">

      <!-- Sayfa Başlığı (Title Section) -->
      <section class="page-title-section" aria-labelledby="page-heading">
        <!-- Üst stripe satırı: mini F1 logo + kırmızı şerit -->
        <div class="page-title-stripe">
          <img
            src="formula-1-logo.png"
            alt=""
            class="logo-img logo-img--stripe"
            aria-hidden="true"
          />
          <div class="stripe-line" aria-hidden="true"></div>
        </div>

        <!-- "TEAMS" başlığı + kırmızı accent çizgisi -->
        <div class="page-title-row">
          <h1 class="page-title" id="page-heading">TEAMS</h1>
          <div class="page-title-accent" aria-hidden="true"></div>
        </div>
      </section>

      <!-- Takım Kartları -->
      <section class="teams-section" aria-label="Takımlar listesi">
              <p class="result-filters" style="padding:0 6% 16px;margin:0">
        <label class="filter-label" for="teams-year">Season</label>
        <select id="teams-year" class="filter-select"></select>
      </p>

        <div class="teams-grid" id="teams-grid"></div>
      </section>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer" role="contentinfo">

      <!-- Üst şerit satırı: logo + kırmızı çizgi -->
      <div class="footer-strip">
        <a href="index.html" class="footer-logo" aria-label="Formula 1 Ana Sayfa">
          <img
            src="formula-1-logo.png"
            alt="Formula 1 Logosu"
            class="logo-img logo-img--footer"
          />
        </a>
        <div class="footer-red-line" aria-hidden="true"></div>
      </div>

      <!-- Alt: Telif metni -->
      <p class="footer-copyright">
        &copy; 2020-2026 Formula One World Championship Limited
      </p>

    </footer>

  
    <script src="f1-api.js"></script>
    <script src="f1-meta.js"></script>
    <script src="f1-pages.js"></script>

  </body>
</html>
