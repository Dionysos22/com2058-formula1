services:
  mysql:
    image: mysql:8.0
    container_name: f1-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-formula_1}
      MYSQL_USER: ${MYSQL_USER:-f1_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-f1_app_password_change_me}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
