<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Stats Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div class="min-h-screen flex">
      <aside class="w-72 shrink-0 border-r border-slate-800 bg-slate-950/70 backdrop-blur">
        <div class="px-6 py-6">
          <div class="flex items-center justify-between">
            <div class="text-lg font-semibold tracking-wide">F1 Stats</div>
            <div class="text-xs text-slate-400">Raw SQL</div>
          </div>
          <div class="mt-2 text-sm text-slate-400">FastAPI + MySQL (Course schema)</div>
        </div>
        <nav class="px-3" id="sidebarNav">
          <a class="nav-item nav-item-active" href="#drivers" data-view="drivers" aria-current="page">Drivers</a>
          <a class="nav-item" href="#circuits" data-view="circuits">Circuits</a>
          <a class="nav-item" href="#races" data-view="races">Races</a>
          <a class="nav-item" href="#standings" data-view="standings">Driver standings</a>
          <a class="nav-item" href="#constructors" data-view="constructors">Constructors</a>
        </nav>
      </aside>
      <main class="flex-1">
        <header class="px-6 py-5 border-b border-slate-800">
          <div class="flex items-start justify-between gap-4">
            <div>
              <h1 class="text-xl font-semibold" id="pageTitle">Drivers by Season</h1>
              <p class="mt-1 text-sm text-slate-400">Vanilla SPA (no React) + raw SQL backend</p>
            </div>
            <div class="flex flex-wrap items-center gap-3" id="controls">
              <div class="flex items-center gap-3">
                <label class="text-sm text-slate-300" for="yearInput">Year</label>
                <select id="yearSelect" class="w-32 rounded-lg bg-slate-900 border border-slate-700 px-3 py-2 text-sm outline-none focus:border-slate-500"></select>
              </div>
              <div class="flex items-center gap-3">
                <input id="searchInput" class="w-56 rounded-lg bg-slate-900 border border-slate-700 px-3 py-2 text-sm outline-none focus:border-slate-500" type="search" placeholder="Search…" />
                <button id="loadBtn" class="rounded-lg bg-indigo-600 hover:bg-indigo-500 px-4 py-2 text-sm font-medium">Load</button>
              </div>
            </div>
          </div>
        </header>
        <section class="px-6 py-6">
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="card"><div class="card-label">Season</div><div class="card-value" id="statSeason">—</div></div>
            <div class="card"><div class="card-label">Drivers</div><div class="card-value" id="statDrivers">—</div></div>
            <div class="card"><div class="card-label">Constructors</div><div class="card-value" id="statConstructors">—</div></div>
            <div class="card"><div class="card-label">Races</div><div class="card-value" id="statRaces">—</div></div>
          </div>
          <div class="mt-6 rounded-xl border border-slate-800 bg-slate-950/40">
            <div class="px-4 py-4 flex items-center justify-between gap-3">
              <div class="text-sm text-slate-300">Results <span class="text-slate-500" id="resultsHint"></span></div>
              <div class="text-sm text-slate-400" id="statusText"></div>
            </div>
            <div class="overflow-x-auto">
              <table class="min-w-full text-sm">
                <thead class="bg-slate-900/60 text-slate-300"><tr id="tableHeadRow"></tr></thead>
                <tbody id="tableBody" class="divide-y divide-slate-800"></tbody>
              </table>
            </div>
            <div id="errorBox" class="hidden px-4 py-4 border-t border-slate-800 text-sm text-red-300"></div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/static/api.js"></script>
  </body>
</html>
