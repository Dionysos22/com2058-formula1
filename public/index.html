<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Formula 1 resmi ana sayfası — takvim, sonuçlar, sürücüler ve takımlar."
    />
    <title>Formula 1 | Official Home</title>

    <!-- Google Fonts: Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!-- ===== HEADER ===== -->
    <header class="site-header" role="banner">
      <div class="header-inner">

        <!-- Sol: Logo -->
        <a href="index.html" class="header-logo" aria-label="Formula 1 Ana Sayfa">
          <img
            src="formula-1-logo.png"
            alt="Formula 1 Logosu"
            class="logo-img logo-img--header"
          />
        </a>

        <!-- Sağ: Navigasyon -->
        <nav class="main-nav" aria-label="Ana navigasyon">
          <ul class="nav-list" role="list">
            <li class="nav-item">
              <a href="schedule.html" class="nav-link" id="nav-schedule">Schedule</a>
            </li>
            <li class="nav-item">
              <a href="result.html" class="nav-link" id="nav-result">Result</a>
            </li>
            <li class="nav-item">
              <a href="drivers.html" class="nav-link" id="nav-drivers">Drivers</a>
            </li>
            <li class="nav-item">
              <a href="teams.html" class="nav-link" id="nav-teams">Teams</a>
            </li>
          </ul>
        </nav>

      </div>
    </header>

    <!-- ===== MAIN ===== -->
    <main class="site-main" id="main-content" role="main">
      <div class="hero-logo-wrapper">
        <img
          src="formula-1-logo.png"
          alt="Formula 1"
          class="logo-img logo-img--hero"
        />
      </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer" role="contentinfo">

      <!-- Üst şerit satırı: logo + kırmızı çizgi -->
      <div class="footer-strip">
        <a href="index.html" class="footer-logo" aria-label="Formula 1 Ana Sayfa">
          <img
            src="formula-1-logo.png"
            alt="Formula 1 Logosu"
            class="logo-img logo-img--footer"
          />
        </a>
        <div class="footer-red-line" aria-hidden="true"></div>
      </div>

      <!-- Alt: Telif metni -->
      <p class="footer-copyright">
        &copy; 2020-2026 Formula One World Championship Limited
      </p>

    </footer>

  </body>
</html>
